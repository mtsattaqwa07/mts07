<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas IX</title>
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <style>
        html, body {
            background: #000;
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
        }
        .container {
            background: #ddd;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
        }
        p {
            color: white;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        .rapot, .pdm {
            margin: 10px;
            padding: 20px;
            text-align: center;
            background: green;
            border-radius: 12px;
        }
        
        .praktek {
            background: green;
            padding: 20px;
            margin: 10px;
            border-radius: 12px;
        }
        .praktek h3 {
            color: white;
        }
        .praktek img {
            border-radius: 10px;
            box-shadow: 0px 8px 16px 0px black;
        }
    </style>
</head>
<body>

    <div class="tombol">
        <a href="index.html" style="position: fixed; background: red; color: white; text-decoration: none; border-radius: 5px; top: 20px; right: 20px; padding: 8px 12px;">Kembali</a>
    </div>
    <div class="container">
        <!-- pdm -->
        <div class="pdm">
            <img src="foto/pdm.jpg" alt="pdm">
            <p>PDM dimulai tanggal 4 November 2025 sampai dengan 11 Februari 2026</p>
        </div>

        <!-- rapot -->
        <div class="rapot">
            <img src="sembilan/ujian.jpg" alt="rapot">
        </div>

        

        <!-- praktek -->
        <div class="praktek">
            <h3>Ujian Praktek</h3>
            <img src="sembilan/praktek.jpg" alt="ujian-praktek">
        </div>
    </div>
</body>
</html>
